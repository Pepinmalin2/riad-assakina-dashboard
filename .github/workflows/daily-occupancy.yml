name: Mise à jour occupancy.json quotidienne

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-occupancy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Générer occupancy.json
        run: python3 scripts/daily-occupancy.py

      - name: Commit si changement
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add occupancy.json
          git diff --staged --quiet || git commit -m "Auto: occupancy.json $(date -u +'%Y-%m-%d')"
          git push
